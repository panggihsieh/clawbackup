<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Countdown Timer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Sora:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="timer-card">
        <p class="eyebrow">Countdown Timer</p>
        <h1>Build time with one tap.</h1>
        <p class="subtitle">
          Stack quick increments, track the total, and run the timer with simple controls.
        </p>

        <div class="display-panel">
          <div class="display-label">Remaining Time</div>
          <div class="time-display" id="time-display" aria-live="polite">00:00</div>
          <div class="status-row">
            <span class="status-pill" id="status-pill">Ready</span>
            <span class="total-time">Total queued: <strong id="total-display">00:00</strong></span>
          </div>
        </div>

        <div class="control-group">
          <div class="group-label">Add Time</div>
          <div class="button-grid">
            <button class="preset-button" data-seconds="1">+1s</button>
            <button class="preset-button" data-seconds="30">+30s</button>
            <button class="preset-button" data-seconds="60">+1min</button>
            <button class="preset-button" data-seconds="600">+10min</button>
          </div>
        </div>

        <div class="control-group">
          <div class="group-label">Controls</div>
          <div class="action-row">
            <button class="action-button primary" id="start-button">Start</button>
            <button class="action-button" id="pause-button">Pause</button>
            <button class="action-button danger" id="reset-button">Reset</button>
          </div>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
